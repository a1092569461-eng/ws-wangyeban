<!DOCTYPE html>
<html>
<head>
    <title>测试文案规范化</title>
</head>
<body>
    <h1>测试文案规范化</h1>
    <div id="result"></div>
    <script>
const CHAR_MAP = {
  '紅':'红','裏':'里','衛':'卫','復':'复','國':'国','區':'区',
  '単':'单','卷':'券','劵':'券','虹':'红',
  '淦':'金','臧':'藏',
  '亓':'元','块':'元',
  '後':'后','發':'发','麵':'面','萬':'万',
  '與':'与','為':'为','個':'个','隻':'只',
  '於':'于','幹':'干','曆':'历','鬥':'斗','係':'系',
  '樸':'朴','硃':'朱','幾':'几','妳':'你',
  '條':'条','簾':'帘','範':'范','號':'号',
  '兔':'免','免':'兔',
};

const OCR_MAP = { '兔':'免','亓':'元' };
const CQ_IMAGE_REG = /\[CQ:image,[^\]]+\]/g;
const CLEAN_TAO_REG = /([^\u4e00-\u9fa5a-zA-Z0-9]*[a-z0-9]{11}[^\u4e00-\u9fa5a-zA-Z0-9]*)/gi;

function normalizeChars(text) {
  for(const [from, to] of Object.entries(CHAR_MAP)) {
    text = text.split(from).join(to);
  }
  return text;
}

function normalizeOCR(text) {
  for (const [from, to] of Object.entries(OCR_MAP)) {
    text = text.split(from).join(to);
  }
  return text;
}

function getNormalizedText(text) {
  let t = text.replace(CQ_IMAGE_REG, '');
  t = t.replace(CLEAN_TAO_REG, '');
  
  // 处理链接：京东链接替换为统一标记JD，其他链接移除
  t = t.replace(/https?:\/\/[^\s<>]+/gi, (url) => {
    return 'JD';
  });
  
  t = t.replace(/领\d*折[券卷]*/g, '');
  t = t.replace(/[-–—―]{2,}/g, '');
  t = t.replace(/[→←↑↓💰￥¥$¥￥~〰～⭕✔✖⚠❗❕📢📣📅📆⏰⏳🎁🔔🔵📌❤💚💛💜🧡✅❌🔴🟠🟡🟢⚫⚪🏠👤👍👏🤝⭐🌟★🎉🎊🛒🛍🧧🔥]+/gu);
  t = t.replace(/[^一-龥a-zA-Z0-9]/gu, '');
  t = t.replace(/购物卷/g, '购物券');
  t = t.replace(/g\+/gi, 'g');
  t = t.replace(/[;，,;.。:：!！?？]+/g, '');
  t = t.replace(/[.。]{2,}/g, '.');
  t = t.replace(/[+-]{2,}/g, '+');
  t = normalizeChars(t);
  t = normalizeOCR(t);
  t = t.replace(/(\d+(?:\.\d+)?)[元亓块]元?/g, 'N');
  t = t.replace(/\d+/g, '');
  return t.trim();
}

const msg1 = "1亓 100包零食";
const msg2 = "1亓零食100包";

const norm1 = getNormalizedText(msg1);
const norm2 = getNormalizedText(msg2);

console.log('消息1:', msg1);
console.log('规范化1:', norm1);
console.log('消息2:', msg2);
console.log('规范化2:', norm2);
console.log('是否相同:', norm1 === norm2);

document.getElementById('result').innerHTML = '<h3>消息1: ' + msg1 + '</h3>';
document.getElementById('result').innerHTML += '<p>规范化: <strong>' + norm1 + '</strong></p>';
document.getElementById('result').innerHTML += '<h3>消息2: ' + msg2 + '</h3>';
document.getElementById('result').innerHTML += '<p>规范化: <strong>' + norm2 + '</strong></p>';
document.getElementById('result').innerHTML += '<h3>是否相同: ' + (norm1 === norm2) + '</h3>';
    </script>
</body>
</html>
